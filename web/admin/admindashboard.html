<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../shared/portal-theme.css">
  <style>
    body { margin:0; font-family:'Inter','Segoe UI',sans-serif; background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%); color:#0f172a; }
    .layout { display:flex; min-height:100vh; }
    .sidebar { width:220px; background:#0f3b2a; color:#fff; padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:4px 0 16px rgba(0,0,0,0.08); }
    .sidebar a { color:#e2e8f0; text-decoration:none; padding:10px 12px; border-radius:8px; display:block; transition:transform .2s, background .2s; }
    .sidebar a:hover { transform:translateX(2px); background:rgba(255,255,255,0.12); }
    .sidebar a.active { background:#14532d; }
    .main { flex:1; padding:24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin:20px 0; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px; box-shadow:0 6px 24px rgba(0,0,0,0.06); }
    .stat { font-size:26px; font-weight:700; }
    button { cursor:pointer; }
    .charts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; margin-top:12px; }
    canvas { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px; box-shadow:0 6px 24px rgba(0,0,0,0.05); }
  </style>
</head>
<body data-page="dashboard">
  <div class="layout">
    <aside class="sidebar">
      <strong>Admin</strong>
      <a href="admindashboard.html" class="active">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="parents.html">Parents</a>
      <a href="staff.html">Staff</a>
      <a href="student-id-generator.html">ID Generator</a>
      <a href="adminsettings.html">Settings</a>
      <button data-back-home style="margin-top:auto;padding:10px;border:none;border-radius:8px;background:#fef3c7;color:#92400e;">Back to Home</button>
      <button data-logout style="padding:10px;border:none;border-radius:8px;background:#fecdd3;color:#b91c1c;">Log Out</button>
    </aside>
    <main class="main">
      <div class="top">
        <div>
        <h2>Dashboard</h2>
          <p>Minimal live snapshot</p>
      </div>
        <div>Hi, <span data-admin-name>Admin</span></div>
    </div>

      <div class="stat-grid">
        <div class="card"><div>Students</div><div class="stat" id="countStudents">0</div></div>
        <div class="card"><div>Parents</div><div class="stat" id="countParents">0</div></div>
        <div class="card"><div>Staff</div><div class="stat" id="countStaff">0</div></div>
        <div class="card"><div>Pending Staff</div><div class="stat" id="countPending">0</div></div>
      </div>

      <div class="charts-grid">
        <div>
          <h4>Students by Class</h4>
          <canvas id="chartStudentsClass" height="260"></canvas>
        </div>
        <div>
          <h4>Fee Status</h4>
          <canvas id="chartFeeStatus" height="260"></canvas>
        </div>
        <div>
          <h4>Staff Status</h4>
          <canvas id="chartStaffStatus" height="260"></canvas>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <h3>Recent</h3>
        <ul id="recentList" style="margin:0;padding-left:18px;"></ul>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../runtime-config.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="admin-lite.js"></script>
</body>
</html>
