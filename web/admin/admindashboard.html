<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../shared/portal-theme.css">
  <link rel="stylesheet" href="shared-admin-styles.css">
  <style>
    body { margin:0; font-family:'Inter','Segoe UI',sans-serif; background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%); color:#0f172a; }
    .main-content { flex:1; padding:35px 40px; overflow-y:auto; margin-left:260px; background:var(--beige-bg); min-height:100vh; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin:20px 0; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px; box-shadow:0 6px 24px rgba(0,0,0,0.06); animation: fadeUp .4s ease; }
    .stat { font-size:26px; font-weight:700; }
    button { cursor:pointer; }
    .charts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; margin-top:12px; }
    canvas { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:12px; box-shadow:0 6px 24px rgba(0,0,0,0.05); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px);} to {opacity:1; transform:translateY(0);} }
  </style>
</head>
<body data-page="dashboard">
  <div class="sidebar">
    <div class="brand">
      <img src="../shared/Hechlink_logo.png" alt="Hechlink Ventures Logo" class="brand-icon">

    <div class="logout-section">
      <button class="logout-btn" data-logout>
        <svg class="logout-icon" viewBox="0 0 24 24"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z" /></svg>
        <span>Log Out</span>
      </button>
      <button class="logout-btn" data-back-home style="margin-top:10px;background:linear-gradient(135deg,#f59e0b 0%,#b45309 100%);">Back to Home</button>
    </div>
  </div>

  <main class="main-content">
    <div class="top">
      <div>
        <h2>Dashboard</h2>
        <p>Live snapshot</p>
      </div>
      <div>Hi, <span data-admin-name>Admin</span></div>
    </div>

    <div class="stat-grid">
      <div class="card"><div>Students</div><div class="stat" id="countStudents">0</div></div>
      <div class="card"><div>Parents</div><div class="stat" id="countParents">0</div></div>
      <div class="card"><div>Staff</div><div class="stat" id="countStaff">0</div></div>
      <div class="card"><div>Pending Staff</div><div class="stat" id="countPending">0</div></div>
    </div>

    <div class="charts-grid">
      <div>
        <h4>Students by Class</h4>
        <canvas id="chartStudentsClass" height="260"></canvas>
      </div>
      <div>
        <h4>Fee Status</h4>
        <canvas id="chartFeeStatus" height="260"></canvas>
      </div>
      <div>
        <h4>Staff Status</h4>
        <canvas id="chartStaffStatus" height="260"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Recent</h3>
      <ul id="recentList" style="margin:0;padding-left:18px;"></ul>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../runtime-config.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="admin-lite.js"></script>
</body>
</html>
