<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Hechlink Ventures</title>
    <link rel="stylesheet" href="shared-admin-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, var(--forest-900) 0%, var(--forest-800) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--surface-white);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--forest-900);
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            pointer-events: none;
            transition: var(--transition);
        }

        input:focus+.input-icon {
            color: var(--forest-600);
        }

        input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--surface-off-white);
        }

        input:focus {
            outline: none;
            border-color: var(--forest-600);
            background: var(--surface-white);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--forest-800) 0%, var(--forest-600) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(20, 83, 45, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(20, 83, 45, 0.3);
            filter: brightness(1.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--forest-700);
        }

        .error-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="shared/Hechlink_logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
        <h1 class="login-title">Admin Portal</h1>
        <p class="login-subtitle">Sign in to manage students and staff</p>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> Invalid credentials
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="admin@hechlink.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>

        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <script src="../runtime-config.js"></script>
    <script src="../shared/api-client.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;

            if (!email || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please enter both email and password';
                return;
            }

            // Reset UI
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                // Use the shared authAPI
                if (typeof authAPI === 'undefined') {
                    throw new Error('API Client not loaded properly');
                }

                const response = await authAPI.login(email, password, 'admin');

                if (response.token) {
                    // Store tokens
                    localStorage.setItem('sv_admin_token', response.token);
                    // Also store as generic auth token for shared API usage
                    localStorage.setItem('sv_auth_token', response.token);
                    if (response.user) {
                        localStorage.setItem('sv_user_data', JSON.stringify(response.user));
                        localStorage.setItem('sv_admin_email', response.user.email);
                    }

                    // Redirect to dashboard
                    window.location.href = 'admindashboard.html';
                } else {
                    throw new Error('Login failed: No token received');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${error.message || 'Invalid credentials'}`;
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
