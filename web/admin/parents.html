<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parents | Admin</title>
  <link rel="stylesheet" href="../shared/portal-theme.css">
  <style>
    body { margin:0; font-family:'Inter','Segoe UI',sans-serif; background:linear-gradient(180deg,#fdfcfb 0%,#f3f4ff 100%); color:#1f2937; }
    .layout { display:flex; min-height:100vh; }
    .sidebar { width:220px; background:#0f3b2a; color:#fff; padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:4px 0 16px rgba(0,0,0,0.08); }
    .sidebar a { color:#e2e8f0; text-decoration:none; padding:10px 12px; border-radius:8px; display:block; transition:transform .2s, background .2s; }
    .sidebar a:hover { transform:translateX(2px); background:rgba(255,255,255,0.12); }
    .sidebar a.active { background:#14532d; }
    .main { flex:1; padding:24px; }
    .topbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #e2e8f0; box-shadow:0 8px 30px rgba(0,0,0,0.06); border-radius:12px; overflow:hidden; }
    th, td { padding:12px; border:1px solid #e5e7eb; text-align:left; }
    button { cursor:pointer; }
    .btn-small { padding:8px 12px; border:none; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff; border-radius:8px; box-shadow:0 4px 14px rgba(102,126,234,0.35); transition:transform .2s; }
    .btn-small:hover { transform:translateY(-1px); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; }
    .modal.show { display:flex; }
    .modal-content { background:#fff; padding:18px; border-radius:12px; width:380px; max-width:90vw; box-shadow:0 12px 40px rgba(0,0,0,0.15); }
    .modal-content form { display:flex; flex-direction:column; gap:10px; }
    .modal-content label { font-size:0.95rem; color:#334155; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  </style>
</head>
<body data-page="parents">
  <div class="layout">
    <aside class="sidebar">
      <strong>Admin</strong>
      <a href="admindashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="parents.html" class="active">Parents</a>
      <a href="staff.html">Staff</a>
      <a href="student-id-generator.html">ID Generator</a>
      <a href="adminsettings.html">Settings</a>
      <button data-back-home style="margin-top:auto;padding:10px;border:none;border-radius:8px;background:#fef3c7;color:#92400e;">Back to Home</button>
      <button data-logout style="padding:10px;border:none;border-radius:8px;background:#fecdd3;color:#b91c1c;">Log Out</button>
    </aside>
    <main class="main">
      <div class="topbar">
        <h2 style="margin:0;">Parents</h2>
        <button id="addParentBtn" class="btn-small">Add Parent</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Relationship</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="parentsBody"><tr><td colspan="6">Loading...</td></tr></tbody>
      </table>
    </main>
  </div>

  <!-- Parent Modal -->
  <div class="modal" id="parentModal">
    <div class="modal-content">
      <h3 style="margin-top:0;">Parent</h3>
      <form id="parentForm">
        <label>Name <input id="parentName" required></label>
        <label>Email <input id="parentEmail" type="email" required></label>
        <label>Phone <input id="parentPhone"></label>
        <label>Relationship <input id="parentRelationship"></label>
        <div class="modal-actions">
          <button type="button" class="btn-small" id="closeParentModal">Cancel</button>
          <button type="submit" class="btn-small">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../runtime-config.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="admin-lite.js"></script>
</body>
</html>
