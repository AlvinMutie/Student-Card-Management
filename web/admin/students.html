<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students | Admin</title>
  <link rel="stylesheet" href="../shared/portal-theme.css">
  <style>
    body { margin:0; font-family:'Inter','Segoe UI',sans-serif; background:#f6f7fb; color:#0f172a; }
    .layout { display:flex; min-height:100vh; }
    .sidebar { width:220px; background:#0f3b2a; color:#fff; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .sidebar a { color:#e2e8f0; text-decoration:none; padding:10px 12px; border-radius:8px; display:block; }
    .sidebar a.active { background:#14532d; }
    .main { flex:1; padding:20px; }
    .topbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #e2e8f0; }
    th, td { padding:10px; border:1px solid #e2e8f0; text-align:left; }
    button { cursor:pointer; }
    .btn-small { padding:6px 10px; border:1px solid #cbd5e1; background:#f8fafc; border-radius:6px; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
    .modal.show { display:flex; }
    .modal-content { background:#fff; padding:16px; border-radius:8px; width:360px; max-width:90vw; }
    .modal-content form { display:flex; flex-direction:column; gap:8px; }
    .modal-content label { font-size:0.9rem; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
  </style>
</head>
<body data-page="students">
  <div class="layout">
    <aside class="sidebar">
      <strong>Admin</strong>
      <a href="admindashboard.html">Dashboard</a>
      <a href="students.html" class="active">Students</a>
      <a href="parents.html">Parents</a>
      <a href="staff.html">Staff</a>
      <a href="student-id-generator.html">ID Generator</a>
      <a href="adminsettings.html">Settings</a>
      <button data-back-home style="margin-top:auto;padding:10px;border:none;border-radius:8px;background:#fef3c7;color:#92400e;">Back to Home</button>
      <button data-logout style="padding:10px;border:none;border-radius:8px;background:#fecdd3;color:#b91c1c;">Log Out</button>
    </aside>
    <main class="main">
      <div class="topbar">
        <h2 style="margin:0;">Students</h2>
        <input id="studentSearch" placeholder="Search students..." style="padding:8px; border:1px solid #cbd5e1; border-radius:6px; flex:1; min-width:220px;">
        <input type="file" id="importStudentsInput" accept=".csv,.xlsx,.xls" style="display:none;">
        <button class="btn-small" onclick="document.getElementById('importStudentsInput').click();">Import Excel/CSV</button>
        <button id="addStudentBtn" class="btn-small">Add Student</button>
    </div>
      <table>
        <thead>
          <tr>
            <th>Adm</th><th>Name</th><th>Class</th><th>Stream</th><th>Parent</th><th>Fee Balance</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsBody"><tr><td colspan="7">Loading...</td></tr></tbody>
      </table>
  </main>
  </div>

  <!-- Student Modal -->
  <div class="modal" id="studentModal">
    <div class="modal-content">
      <h3 style="margin-top:0;">Student</h3>
      <form id="studentForm">
        <label>Admission <input id="studentAdm" required></label>
        <label>Name <input id="studentName" required></label>
        <label>Class <input id="studentClass"></label>
        <label>Stream <input id="studentStream"></label>
        <label>Fee Balance <input id="studentFee" type="number" step="0.01"></label>
        <label>Parent Name <input id="studentParentName"></label>
        <label>Parent Email <input id="studentParentEmail" type="email"></label>
        <div class="modal-actions">
          <button type="button" class="btn-small" id="closeStudentModal">Cancel</button>
          <button type="submit" class="btn-small">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../runtime-config.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="admin-lite.js"></script>
</body>
</html>
